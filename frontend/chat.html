<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESGA DataPower RCA Assistant — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .3px; }
    header p  { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    header .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header .nav-right a {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      color: #cbd5e1;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    header .nav-right a:hover { background: rgba(255,255,255,0.1); color: #fff; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg { display: flex; gap: 10px; max-width: 780px; width: 100%; }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; margin-top: 2px;
    }
    .msg.user .avatar      { background: #3b82f6; color: #fff; }
    .msg.assistant .avatar { background: #e2e8f0; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
      max-width: calc(100% - 44px);
    }
    .msg.user .bubble {
      background: #3b82f6;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .bubble p   { margin-bottom: 8px; }
    .bubble p:last-of-type { margin-bottom: 0; }
    .bubble code {
      background: rgba(0,0,0,.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 13px;
    }
    .msg.user .bubble code { background: rgba(255,255,255,.2); }

    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-chip {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: #475569;
      white-space: nowrap;
    }

    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #94a3b8;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    .error-msg {
      color: #dc2626;
      font-size: 13px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #query {
      flex: 1;
      resize: none;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 160px;
      outline: none;
      transition: border-color .15s;
    }
    #query:focus { border-color: #3b82f6; }
    #send {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
      height: 42px;
    }
    #send:hover    { background: #2563eb; }
    #send:disabled { background: #93c5fd; cursor: default; }

    .hint {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      padding: 40px 16px 0;
    }
    .hint strong { display: block; font-size: 15px; color: #64748b; margin-bottom: 6px; }

    .examples {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      padding: 0 8px;
    }
    .example-chip {
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #334155;
      cursor: pointer;
      text-align: left;
      max-width: 320px;
      line-height: 1.45;
      transition: border-color .15s, box-shadow .15s, background .15s;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .example-chip:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
      background: #f8faff;
    }
    .example-chip .ex-icon {
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">⚡</span>
  <div>
    <h1>ESGA DataPower RCA Assistant</h1>
    <p>AI-powered incident troubleshooting · Powered by ESGA runbooks</p>
  </div>
  <div class="nav-right">
    <a href="/">← Home</a>
    <a href="/eval-report" target="_blank">📊 Eval Report</a>
  </div>
</header>

<div id="chat">
  <div class="hint">
    <strong>Ask about a DataPower incident</strong>
    Paste an error code, describe a symptom, or ask who to escalate to.
    <div class="examples">
      <button class="example-chip" onclick="useExample(this)">
        <span class="ex-icon">🔴</span>
        What does error code 0x00d30003 mean on DataPower?
      </button>
      <button class="example-chip" onclick="useExample(this)">
        <span class="ex-icon">🌐</span>
        Multiple backend services are timing out simultaneously. What should I check first?
      </button>
      <button class="example-chip" onclick="useExample(this)">
        <span class="ex-icon">🔑</span>
        All users are getting HTTP 401 after a JWT signing key rotation. How do I fix this?
      </button>
      <button class="example-chip" onclick="useExample(this)">
        <span class="ex-icon">📋</span>
        A backend timeout issue has persisted for over 30 minutes. Who do I escalate to and what is the SLA?
      </button>
      <button class="example-chip" onclick="useExample(this)">
        <span class="ex-icon">🔒</span>
        DataPower is showing a certificate expiry warning for a service. What should I do?
      </button>
      <button class="example-chip" onclick="useExample(this)">
        <span class="ex-icon">🚦</span>
        A client is receiving HTTP 429 Too Many Requests from DataPower. How do I investigate?
      </button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="query" rows="1" placeholder="Describe the incident or paste an error code… (Enter to send)"></textarea>
  <button id="send">Send</button>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('query');
  const sendBtn = document.getElementById('send');

  function useExample(btn) {
    const text = btn.querySelector('.ex-icon').nextSibling.textContent.trim();
    input.value = text;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    input.focus();
    sendMessage();
  }

  const HISTORY_WINDOW = 10;
  let history = [];

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  function appendMessage(role, text, sources = []) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    if (sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'source-chip';
        chip.textContent = `${s.pattern_id} · ${s.section_title}`;
        srcDiv.appendChild(chip);
      });
      bubble.appendChild(srcDiv);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const dots = document.createElement('div');
    dots.className = 'typing';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(dots);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function trimHistory(hist) {
    const max = HISTORY_WINDOW * 2;
    return hist.length > max ? hist.slice(-max) : hist;
  }

  async function sendMessage() {
    const query = input.value.trim();
    if (!query || sendBtn.disabled) return;

    const hint = chat.querySelector('.hint');
    if (hint) hint.remove();

    appendMessage('user', query);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history: trimHistory(history) }),
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        appendMessage('assistant', `Error: ${err.detail || 'Request failed'}`);
      } else {
        const data = await resp.json();
        appendMessage('assistant', data.answer, data.sources);

        history.push({ role: 'user',      content: query       });
        history.push({ role: 'assistant', content: data.answer });
        history = trimHistory(history);
      }
    } catch (err) {
      removeTyping();
      appendMessage('assistant', `Network error: ${err.message}`);
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
